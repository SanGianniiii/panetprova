<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FFD700">
  <title>WebApp Beta - Gestione Ordini</title>
  <style>
/* --- STILI BASE E LAYOUT --- */
body {
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #f1f8e9 0%, #d1e9ff 100%);
    margin: 0;
    padding: 1rem;
    color: #1a3a3a;
    min-height: 100vh;
}

header {
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 1.5rem;
}
header img {
    width: 60px; 
    height: 60px;
    object-fit: contain;
}
h2 {
    margin: 0;
    font-size: 1.5rem;
    color: #0a1a3f;
}

/* --- FORM E INPUT --- */
select, input[type="number"], input[type="text"], button {
    width: 100%;
    padding: 0.8rem;
    margin-top: 0.5rem;
    font-size: 1rem;
    border-radius: 8px;
    border: 1px solid #a5d6a7;
    box-sizing: border-box;
}

label {
    font-weight: bold;
    color: #2e7d32;
    display: block;
    margin-top: 1rem;
}

/* --- TABELLE E CONTENITORI --- */
.table-wrapper {
    width: 100%;
    overflow-x: auto;
    margin-top: 1rem;
    border-radius: 8px;
    background-color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed; /* Importante per controllare le larghezze */
}

th, td {
    padding: 0.8rem 0.4rem;
    text-align: center;
    border-bottom: 1px solid #edf2f7;
    word-wrap: break-word; /* Testo a capo */
    font-size: 0.9rem;
}

th {
    background-color: #2e7d32;
    color: white;
    font-weight: 600;
}

/* --- MODULAZIONE COLONNE TABELLA PRINCIPALE --- */
.col-prod { width: 30%; text-align: left; padding-left: 10px; }
.col-disp { width: 15%; }
.col-qta { width: 20%; }
.col-nota { width: 35%; }

td input[type="number"], td input[type="text"] {
    margin: 0;
    padding: 0.5rem;
    font-size: 0.9rem;
}

/* --- BOTTONI --- */
button {
    background-color: #2e7d32;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, background 0.3s;
    margin-top: 1rem;
}
button:active { transform: scale(0.98); }
button:hover { background-color: #1b5e20; }

.btn-secondary { background-color: #6c757d; }
.btn-dark { background-color: #0a1a3f; }

/* --- MODALI (SISTEMA Z-INDEX) --- */
/* Modal Conferma (Il più alto) */
#modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 30000; 
}

/* Modali Dettaglio e Riepilogo */
#modal-riepilogo, #modal-dettaglio-persone {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 20000;
}

.modal-content-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* --- DETTAGLIO PERSONA CARD --- */
.card-persona {
    border: 1px solid #c8e6c9;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 15px;
    background-color: #fafafa;
}
.card-persona h4 {
    margin: 0 0 10px 0;
    color: #0a1a3f;
    border-bottom: 2px solid #2e7d32;
    padding-bottom: 5px;
}

/* --- ANIMAZIONI --- */
.spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 3px solid rgba(46, 125, 50, 0.3);
    border-top: 3px solid #2e7d32;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (min-width: 600px) {
    .modal-content-box { width: 500px; }
}
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="Logo" onerror="this.style.display='none'"/>
  <h2>WebApp Ordini v.Beta</h2>
</header>

<div style="max-width: 600px; margin: auto;">
    <label for="nome">👤 Famiglia Padrini:</label>
    <select id="nome">
      <option value="">-- Seleziona --</option>
      <option>Carapezza</option><option>Caruso</option><option>Di Maria</option>
      <option>Marino</option><option>Massimino</option><option>Milanese</option>
      <option>Murabito</option><option>Nicosia</option><option>Pantellaro</option>
      <option>Porto</option><option>Romano</option><option>Ruiz</option>
      <option>Scala</option><option>Tanasi</option><option>Zammillo</option>
    </select>

    <div id="sezione-prodotti">
      <h3 style="color: #2e7d32; margin-top: 1.5rem;">📦 Disponibilità</h3>
      <div id="lista-prodotti"></div>
    </div>

    <button onclick="confermaOrdine()">🚀 Invia Prenotazione</button>
    <button class="btn-dark" onclick="mostraRiepilogoPrenotazioni()">📊 Vedi Mio Riepilogo</button>
</div>

<div id="modal">
  <div class="modal-content-box">
    <h3 id="titoloModal" style="color: #2e7d32; margin-top: 0;">Conferma Azione</h3>
    <div id="riepilogoCorpo" style="background: #f9f9f9; padding: 10px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; font-size: 0.9rem; border: 1px solid #ddd;"></div>
    
    <div id="messaggioAttesa" style="display:none; margin-top: 15px; font-weight: bold; color: #2e7d32;">
      Elaborazione in corso... <span class="spinner"></span>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button id="btnEsegui" onclick="eseguiOperazioneBackend()" style="margin:0;">Conferma</button>
        <button onclick="chiudiModal()" class="btn-secondary" style="margin:0;">Annulla</button>
    </div>
  </div>
</div>

<div id="modal-riepilogo">
  <div class="modal-content-box" style="max-width: 600px;">
    <h3 style="margin-top: 0;">Riepilogo Famiglia</h3>
    <div id="contenuto-riepilogo"></div>
    <button class="btn-secondary" onclick="document.getElementById('modal-riepilogo').style.display='none'">Chiudi</button>
  </div>
</div>

<div id="modal-dettaglio-persone">
  <div class="modal-content-box" style="max-width: 650px; width: 95%;">
    <h3 style="margin-top: 0;">Dettaglio per Persona</h3>
    <div id="contenuto-dettaglio"></div>
    <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button onclick="preparaModificaDettaglio()" style="margin:0;">Applica Modifiche</button>
        <button class="btn-secondary" onclick="document.getElementById('modal-dettaglio-persone').style.display='none'" style="margin:0;">Chiudi</button>
    </div>
  </div>
</div>

<script>
  const scriptUrl = "https://script.google.com/macros/s/AKfycbxEDGWC2lozKekZlR1dvIY2_3OZYdPb81-pTN2kBCCag3suzm_ArdGSNqOlPy_hmIQW/exec";
  let prodottiGlobal = [];
  let payloadTemporaneo = [];
  let tipoAzione = ""; // "prenota" o "modifica"

  const PREZZI = {
      "pistacchio": 19, "nocciola": 19, "fondente": 19, "mandorla": 19, 
      "caffe": 19, "pera ciocco": 17, "arancia candita": 17, 
      "frutti di bosco": 17, "jelly limone arancia rossa": 19
  };

  function getPrezzo(nome) {
      const n = nome.toLowerCase();
      for (const [k, v] of Object.entries(PREZZI)) { if (n.includes(k)) return v; }
      return 0;
  }

  // Caricamento Iniziale
  async function caricaDati() {
    try {
      const res = await fetch(scriptUrl + "?action=read");
      prodottiGlobal = await res.json();
      renderizzaTabellaPrincipale();
      const fav = localStorage.getItem("famiglia");
      if (fav) document.getElementById("nome").value = fav;
    } catch (e) { alert("Errore caricamento: " + e.message); }
  }

  function renderizzaTabellaPrincipale() {
    let html = `<div class="table-wrapper">
                  <table>
                    <thead>
                      <tr>
                        <th class="col-prod">Prodotto</th>
                        <th class="col-disp">Disp.</th>
                        <th class="col-qta">Quantità</th>
                        <th class="col-nota">Nota (Chi?)</th>
                      </tr>
                    </thead>
                    <tbody>`;
    prodottiGlobal.forEach((p, i) => {
      html += `<tr>
                <td class="col-prod" style="font-weight:600;">${p.tipo}</td>
                <td class="col-disp">${p.giacenza}</td>
                <td class="col-qta">
                  ${p.giacenza > 0 ? `<input type="number" id="qta-${i}" min="0" max="${p.giacenza}" placeholder="0">` : `<span style="color:red; font-size:0.7rem;">FINITO</span>`}
                </td>
                <td class="col-nota">
                  <input type="text" id="nota-${i}" placeholder="Es: 1 Mario">
                </td>
               </tr>`;
    });
    html += `</tbody></table></div>`;
    document.getElementById("lista-prodotti").innerHTML = html;
  }

  // Logica Prenotazione
  function confermaOrdine() {
    const nomeFamiglia = document.getElementById("nome").value;
    if (!nomeFamiglia) return alert("Seleziona la famiglia!");
    localStorage.setItem("famiglia", nomeFamiglia);

    const ordine = [];
    prodottiGlobal.forEach((p, i) => {
      const q = parseInt(document.getElementById(`qta-${i}`)?.value) || 0;
      const n = document.getElementById(`nota-${i}`)?.value.trim() || "";
      if (q > 0) {
        if (!n) { alert(`Inserisci una nota per ${p.tipo}`); throw "Stop"; }
        ordine.push({ nome: nomeFamiglia, prodotto: p.tipo, quantita: q, nota: n });
      }
    });

    if (ordine.length === 0) return;

    tipoAzione = "prenota";
    payloadTemporaneo = ordine;
    
    let text = `Famiglia: ${nomeFamiglia}\n\n`;
    ordine.forEach(o => text += `• ${o.prodotto}: ${o.quantita} (${o.nota})\n`);
    
    apriModalConferma("Conferma Nuova Prenotazione", text);
  }

  // Riepilogo Famiglia (Schermo Pieno)
  async function mostraRiepilogoPrenotazioni() {
    const fam = document.getElementById("nome").value;
    if (!fam) return alert("Seleziona la famiglia!");

    const cont = document.getElementById("contenuto-riepilogo");
    cont.innerHTML = `<div class="spinner"></div> Caricamento...`;
    document.getElementById("modal-riepilogo").style.display = "flex";

    try {
      const res = await fetch(`${scriptUrl}?action=riepilogo&nominativo=${encodeURIComponent(fam)}`);
      const data = await res.json();
      
      let html = `<div style="background:#e8f5e9; padding:10px; border-radius:8px; margin-bottom:15px;">
                    <strong>${fam}</strong><br>Totale prodotti: ${data.totaleProdotti}
                  </div>`;
      
      html += `<div class="table-wrapper">
                <table style="width:100%; font-size:1.1rem;">
                  <tr style="background:#2e7d32; color:white;">
                    <th style="text-align:left; padding:12px;">Prodotto</th>
                    <th style="width:30%;">Qtà</th>
                  </tr>`;
      
      data.riepilogoArray.filter(x => x.valore > 0).forEach(item => {
        html += `<tr>
                  <td style="text-align:left; padding:12px;">${item.prodotto}</td>
                  <td style="font-weight:bold; font-size:1.3rem;">${item.valore}</td>
                 </tr>`;
      });
      html += `</table></div>`;
      html += `<h3 style="text-align:right; color:#2e7d32;">Totale: € ${data.totaleDaPagare}</h3>`;
      html += `<button class="btn-dark" onclick="mostraDettaglioPerPersone()">Dettaglio per Singola Persona</button>`;
      
      cont.innerHTML = html;
    } catch (e) { cont.innerHTML = "Errore: " + e.message; }
  }

  // Dettaglio Persone (CON TOTALE REINSERITO)
  async function mostraDettaglioPerPersone() {
    document.getElementById("modal-riepilogo").style.display = "none";
    const fam = document.getElementById("nome").value;
    const cont = document.getElementById("contenuto-dettaglio");
    cont.innerHTML = `<div class="spinner"></div> Caricamento dettagli...`;
    document.getElementById("modal-dettaglio-persone").style.display = "flex";

    try {
      const res = await fetch(`${scriptUrl}?action=dettaglio&nominativo=${encodeURIComponent(fam)}`);
      const persone = await res.json();
      
      let html = "";
      persone.forEach((pers, pIdx) => {
        let totaleEuroPersona = 0; // Inizializziamo il totale per questa persona

        html += `<div class="card-persona">
                  <h4>👤 ${pers.nominativo}</h4>
                  <div class="table-wrapper">
                    <table style="width:100%;">
                      <tr style="font-size:0.8rem; background:#f0f0f0;">
                        <th style="color:black; background:#eee; text-align:left;">Prodotto</th>
                        <th style="color:black; background:#eee; width:15%;">Att.</th>
                        <th style="color:green; background:#eee; width:20%;">+</th>
                        <th style="color:red; background:#eee; width:20%;">-</th>
                      </tr>`;
        
        for (const [prod, qta] of Object.entries(pers.prodotti)) {
          // Calcolo del prezzo
          const prezzoUnitario = getPrezzo(prod);
          totaleEuroPersona += (qta * prezzoUnitario);

          html += `<tr>
                    <td style="text-align:left;">${prod}</td>
                    <td><strong>${qta}</strong></td>
                    <td><input type="number" class="in-add" data-pers="${pers.nominativo}" data-prod="${prod}" value="0" min="0"></td>
                    <td><input type="number" class="in-sub" data-pers="${pers.nominativo}" data-prod="${prod}" value="0" min="0" max="${qta}"></td>
                   </tr>`;
        }
        html += `</table></div>`;
        
        // REINSERIMENTO DEL TOTALE IN FONDO ALLA CARD
        html += `<div style="text-align: right; margin-top: 10px; font-weight: bold; font-size: 1.1rem; color: #2e7d32;">
                    Parziale: € ${totaleEuroPersona}
                 </div>`;
        html += `</div>`;
      });
      cont.innerHTML = html || "Nessun dato trovato.";
    } catch (e) { cont.innerHTML = "Errore: " + e.message; }
  }
  // Conferma Modifiche
  function preparaModificaDettaglio() {
    const fam = document.getElementById("nome").value;
    const modifiche = [];
    let riepilogoTesto = `⚠️ MODIFICA ORDINI ESISTENTI\nFamiglia: ${fam}\n\n`;

    document.querySelectorAll(".card-persona").forEach(card => {
        const inAdds = card.querySelectorAll(".in-add");
        const inSubs = card.querySelectorAll(".in-sub");

        inAdds.forEach((el, i) => {
            const add = parseInt(el.value) || 0;
            const sub = parseInt(inSubs[i].value) || 0;
            const netto = add - sub;

            if (netto !== 0) {
                const prod = el.dataset.prod;
                const pers = el.dataset.pers;
                modifiche.push({
                    nome: fam,
                    prodotto: prod,
                    quantita: netto,
                    nota: `${netto > 0 ? 'Aggiunta' : 'Sottrazione'} da ${pers} (Dettaglio)`
                });
                riepilogoTesto += `• ${pers} | ${prod}: ${netto > 0 ? '+' : ''}${netto}\n`;
            }
        });
    });

    if (modifiche.length === 0) return alert("Nessuna modifica inserita.");
    
    tipoAzione = "modifica";
    payloadTemporaneo = modifiche;
    apriModalConferma("Conferma Modifiche", riepilogoTesto);
  }

  // Gestione Modal Universale
  function apriModalConferma(titolo, testo) {
    document.getElementById("titoloModal").innerText = titolo;
    document.getElementById("riepilogoCorpo").innerText = testo;
    document.getElementById("modal").style.display = "flex";
  }

  function chiudiModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("messaggioAttesa").style.display = "none";
  }

  async function eseguiOperazioneBackend() {
    document.getElementById("messaggioAttesa").style.display = "block";
    try {
      const res = await fetch(scriptUrl, {
        method: "POST",
        body: JSON.stringify({ action: "prenota", ordine: payloadTemporaneo })
      });
      const result = await res.json();
      alert("✅ Operazione completata!");
      location.reload(); // Ricarica per aggiornare tutto
    } catch (e) {
      alert("Errore: " + e.message);
      document.getElementById("messaggioAttesa").style.display = "none";
    }
  }

  window.onload = caricaDati;
</script>

</body>
</html>
