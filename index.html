<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FFD700">
  <title>Versione Beta2</title>
  <style>
/* --- STILI BASE --- */
body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(to right, #e8f5e9, #0a1a3f);
    margin: 0;
    padding: 1rem;
    color: #2e7d32;
}

/* --- STILI MODAL --- */
#modal-riepilogo > div, #modal-dettaglio-persone > div {
    max-height: 90vh;
    overflow-y: auto;
    padding: 15px;
    max-width: 95%;
    background: white;
    border-radius: 10px;
}

.dettaglio-persona {
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #f9f9f9;
}

/* --- MINI PULSANTI +/- --- */
.btn-control {
    width: 35px !important;
    height: 35px !important;
    padding: 0 !important;
    margin: 0 !important;
    border-radius: 50% !important;
    font-size: 1.2rem !important;
    font-weight: bold !important;
    display: flex !important;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    color: white;
}
.btn-plus { background-color: #2e7d32 !important; }
.btn-minus { background-color: #d32f2f !important; }

/* Rimuove freccette input number */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* --- HEADER e FORM --- */
header {
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 2rem;
}
header img { width: 60px; height: 60px; }
h2 { margin: 0; font-size: 1.5rem; color: #fff; }

select, input[type="number"], input[type="text"], .btn-main {
    width: 100%;
    padding: 0.7rem;
    margin-top: 1rem;
    font-size: 1rem;
    border-radius: 6px;
    border: 1px solid #a5d6a7;
    box-sizing: border-box;
}

.btn-main {
    background-color: #2e7d32;
    color: white;
    font-weight: bold;
    border: none;
}

/* --- TABELLE MOBILE --- */
table {
    width: 100%;
    border-collapse: collapse;
    background-color: white;
    margin-top: 1rem;
    border-radius: 8px;
    overflow: hidden;
}
th, td {
    padding: 8px;
    font-size: 0.85rem;
    text-align: center;
    border-bottom: 1px solid #eee;
}
th { background-color: #a5d6a7; color: white; }

/* --- MODAL GENERICO --- */
.modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10000;
}

/* --- SPINNER --- */
.spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #2e7d32;
    border-top: 2px solid transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="Logo" />
  <h2>Versione Beta2</h2>
</header>

<label for="nome" style="color: white;">Seleziona Famiglia:</label>
<select id="nome">
  <option value="">-- Seleziona --</option>
  <option>Carapezza</option><option>Caruso</option><option>Di Maria</option>
  <option>Marino</option><option>Massimino</option><option>Milanese</option>
  <option>Murabito</option><option>Nicosia</option><option>Pantellaro</option>
  <option>Porto</option><option>Romano</option><option>Ruiz</option>
  <option>Scala</option><option>Tanasi</option><option>Zammillo</option>
</select>

<div id="prodotti"></div>

<button class="btn-main" onclick="confermaOrdine()">Prenota</button>
<button class="btn-main" style="background-color: #0a1a3f;" onclick="mostraRiepilogoPrenotazioni()">Riepilogo Prenotazioni</button>

<div id="modal" class="modal-overlay">
  <div style="background: white; padding: 20px; border-radius: 10px; width: 90%;">
    <h3>Conferma ordine</h3>
    <pre id="riepilogoModal" style="white-space: pre-wrap; font-family: sans-serif;"></pre>
    <div id="messaggioAttesa" style="display:none; color:#2e7d32;">Processing... <span class="spinner"></span></div>
    <div style="display: flex; gap: 10px;">
        <button class="btn-main" onclick="inviaOrdine()">Invia</button>
        <button class="btn-main" style="background:#6c757d;" onclick="chiudiModal()">Annulla</button>
    </div>
  </div>
</div>

<div id="modal-riepilogo" class="modal-overlay">
  <div> 
    <h3>Riepilogo Famiglia</h3>
    <div id="spinner-riepilogo" style="display:none;">Caricamento... <span class="spinner"></span></div>
    <div id="contenuto-riepilogo"></div>
  </div>
</div>

<div id="modal-dettaglio-persone" class="modal-overlay">
  <div>
    <h3>Modifica Dettaglio</h3>
    <div id="spinner-dettaglio" style="display:none;">Caricamento... <span class="spinner"></span></div>
    <div id="contenuto-dettaglio"></div>
    <div id="pulsanti-dettaglio" style="display: flex; gap: 10px; margin-top: 15px;">
      <button id="btnApplicaModifiche" class="btn-main" onclick="inviaModificaDettaglio()">Salva</button>
      <button class="btn-main" style="background:#6c757d;" onclick="document.getElementById('modal-dettaglio-persone').style.display='none'">Esci</button>
    </div>
  </div>
</div>

<script>
  const scriptUrl = "https://script.google.com/macros/s/AKfycbxEDGWC2lozKekZlR1dvIY2_3OZYdPb81-pTN2kBCCag3suzm_ArdGSNqOlPy_hmIQW/exec";
  let prodotti = [];
  let ordineDaInviare = [];
  let riepilogoCorrente = [];

  async function caricaProdotti() {
    try {
      const res = await fetch(scriptUrl + "?action=read");
      prodotti = await res.json();
      mostraTabella();
      const salvato = localStorage.getItem("famiglia");
      if (salvato) document.getElementById("nome").value = salvato;
    } catch (e) { alert("Errore: " + e.message); } 
  }

  function mostraTabella() {
    let html = "<table><tr><th>Prodotto</th><th>Disp.</th><th>Qtà</th><th>Nota</th></tr>"; 
    prodotti.forEach((p, i) => {
      html += `<tr>
                <td>${p.tipo}</td>
                <td><strong>${p.giacenza}</strong></td>
                <td>${p.giacenza <= 0 ? 'SO' : `<input type="number" id="quantita-${i}" min="0" style="width:40px">`}</td>
                <td><input type="text" id="nota-${i}" placeholder="Nome" style="width:70px"></td> 
              </tr>`;
    });
    document.getElementById("prodotti").innerHTML = html + "</table>";
  }

  function confermaOrdine() {
    const nome = document.getElementById("nome").value;
    if (!nome) return alert("Seleziona Famiglia");
    localStorage.setItem("famiglia", nome);

    const ordine = [];
    prodotti.forEach((p, i) => {
      const q = parseInt(document.getElementById(`quantita-${i}`)?.value) || 0;
      const n = document.getElementById(`nota-${i}`).value.trim();
      if (q > 0) {
          if (!n) { alert("Inserisci nota per " + p.tipo); return; }
          ordine.push({ nome, prodotto: p.tipo, quantita: q, nota: n });
      }
    });

    if (!ordine.length) return;
    ordineDaInviare = ordine;
    document.getElementById("riepilogoModal").innerText = ordine.map(o => `${o.prodotto}: ${o.quantita} (${o.nota})`).join("\n");
    document.getElementById("modal").style.display = "flex";
  }

  function chiudiModal() { document.getElementById("modal").style.display = "none"; }

  async function inviaOrdine() {
    document.getElementById("messaggioAttesa").style.display = "block";
    try {
      await fetch(scriptUrl, { method: "POST", body: JSON.stringify({ action: "prenota", ordine: ordineDaInviare }) });
      alert("Inviato!");
      location.reload();
    } catch (e) { alert(e.message); }
  }

  async function mostraRiepilogoPrenotazioni() {
    const nominativo = document.getElementById('nome').value;
    if (!nominativo) return alert("Seleziona Famiglia");
    const cont = document.getElementById("contenuto-riepilogo");
    document.getElementById('modal-riepilogo').style.display = "flex";
    document.getElementById("spinner-riepilogo").style.display = "block";
    cont.innerHTML = "";

    try {
      const res = await fetch(scriptUrl + "?action=riepilogo&nominativo=" + encodeURIComponent(nominativo));
      riepilogoCorrente = await res.json();
      document.getElementById("spinner-riepilogo").style.display = "none";
      
      const attivi = riepilogoCorrente.filter(x => x.valore > 0);
      let html = `<table><tr><th>Prodotto</th><th>Qtà</th><th>Ann.</th></tr>`;
      attivi.forEach((item, i) => {
        html += `<tr><td>${item.prodotto}</td><td>${item.valore}</td>
                 <td><input type="number" id="annulla-${i}" value="0" style="width:40px"></td></tr>`;
      });
      cont.innerHTML = html + `</table>
        <button class="btn-main" onclick="mostraDettaglioPerPersone(true)">Vedi/Modifica Persone</button>
        <button class="btn-main" style="background:#6c757d" onclick="document.getElementById('modal-riepilogo').style.display='none'">Chiudi</button>`;
    } catch (e) { alert(e.message); }
  }

  async function mostraDettaglioPerPersone(chiudiRiep) {
    const nom = document.getElementById('nome').value;
    if (chiudiRiep) document.getElementById('modal-riepilogo').style.display = "none";
    document.getElementById('modal-dettaglio-persone').style.display = "flex";
    const cont = document.getElementById("contenuto-dettaglio");
    cont.innerHTML = "";
    document.getElementById("spinner-dettaglio").style.display = "block";

    try {
        const res = await fetch(scriptUrl + "?action=dettaglio&nominativo=" + encodeURIComponent(nom));
        const dati = await res.json();
        document.getElementById("spinner-dettaglio").style.display = "none";

        dati.forEach((persona, pIdx) => {
            let html = `<div class="dettaglio-persona">
                <h5>👤 ${persona.nominativo}</h5>
                <table style="font-size:0.8rem">`;
            Object.keys(persona).forEach(key => {
                if (key !== 'nominativo') {
                    const idInput = `modifica-${pIdx}-${key.replace(/\s/g, '_')}`;
                    html += `<tr><td>${key}</td><td><b>${persona[key]}</b></td>
                        <td><div style="display:flex; gap:5px; align-items:center;">
                            <button type="button" class="btn-control btn-minus" onclick="cambiaValore('${idInput}', -1, ${persona[key]})">-</button>
                            <input type="number" id="${idInput}" value="0" readonly data-prodotto="${key}" data-persona="${persona.nominativo}" style="width:30px; text-align:center; border:none; background:transparent; font-weight:bold;">
                            <button type="button" class="btn-control btn-plus" onclick="cambiaValore('${idInput}', 1)">+</button>
                        </div></td></tr>`;
                }
            });
            cont.innerHTML += html + `</table></div>`;
        });
    } catch (e) { alert(e.message); }
  }

  function cambiaValore(id, delta, maxSott) {
    const input = document.getElementById(id);
    let val = parseInt(input.value) || 0;
    let nuovo = val + delta;
    if (delta < 0 && maxSott !== null && Math.abs(nuovo) > maxSott) return;
    input.value = nuovo;
    input.style.color = nuovo > 0 ? "#2e7d32" : (nuovo < 0 ? "#d32f2f" : "black");
  }

  async function inviaModificaDettaglio() {
    const fam = document.getElementById("nome").value;
    const modifiche = [];
    document.querySelectorAll('[id^="modifica-"]').forEach(input => {
        const v = parseInt(input.value) || 0;
        if (v !== 0) {
            modifiche.push({
                nome: fam, 
                prodotto: input.getAttribute('data-prodotto'),
                quantita: v,
                nota: `${v > 0 ? 'Aggiunta' : 'Sottrazione'} da ${input.getAttribute('data-persona')} (Dettaglio)`
            });
        }
    });

    if (!modifiche.length) return alert("Nessuna modifica");
    if (!confirm("Confermi le modifiche?")) return;

    try {
        await fetch(scriptUrl, { method: "POST", body: JSON.stringify({ action: "prenota", ordine: modifiche }) });
        alert("Fatto!");
        location.reload();
    } catch (e) { alert(e.message); }
  }

  window.onload = caricaProdotti;
</script>
</body>
</html>
